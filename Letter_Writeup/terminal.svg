<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 210" width="520" height="210">
  <defs>
    <style>
      @keyframes blink {
        0%,49%  { opacity: 1; }
        50%,100%{ opacity: 0; }
      }
      @keyframes typeIn1 {
        0%,5%   { opacity: 0; }
        10%,100%{ opacity: 1; }
      }
      @keyframes typeIn2 {
        0%,18%  { opacity: 0; }
        22%,100%{ opacity: 1; }
      }
      @keyframes typeIn3 {
        0%,32%  { opacity: 0; }
        36%,100%{ opacity: 1; }
      }
      @keyframes typeIn4 {
        0%,40%  { opacity: 0; }
        44%,100%{ opacity: 1; }
      }
      @keyframes typeIn5 {
        0%,48%  { opacity: 0; }
        52%,100%{ opacity: 1; }
      }
      @keyframes typeIn6 {
        0%,56%  { opacity: 0; }
        60%,100%{ opacity: 1; }
      }
      @keyframes typeIn7 {
        0%,64%  { opacity: 0; }
        68%,100%{ opacity: 1; }
      }
      @keyframes typeIn8 {
        0%,72%  { opacity: 0; }
        76%,100%{ opacity: 1; }
      }
      .cursor { animation: blink 1.1s step-end infinite; }
      .l1 { animation: typeIn1 6s ease-out infinite; }
      .l2 { animation: typeIn2 6s ease-out infinite; }
      .l3 { animation: typeIn3 6s ease-out infinite; }
      .l4 { animation: typeIn4 6s ease-out infinite; }
      .l5 { animation: typeIn5 6s ease-out infinite; }
      .l6 { animation: typeIn6 6s ease-out infinite; }
      .l7 { animation: typeIn7 6s ease-out infinite; }
      .l8 { animation: typeIn8 6s ease-out infinite; }
    </style>
  </defs>

  <!-- Window background -->
  <rect width="520" height="210" rx="10" fill="#1e1e2e"/>

  <!-- Title bar -->
  <rect width="520" height="34" rx="10" fill="#313244"/>
  <rect y="24" width="520" height="10" fill="#313244"/>

  <!-- Traffic lights -->
  <circle cx="22" cy="17" r="6.5" fill="#f38ba8"/>
  <circle cx="44" cy="17" r="6.5" fill="#f9e2af"/>
  <circle cx="66" cy="17" r="6.5" fill="#a6e3a1"/>

  <!-- Title bar text -->
  <text x="260" y="22" font-family="monospace" font-size="11"
        fill="#9399b2" text-anchor="middle">zsh — Letter Investigation</text>

  <!-- Command 1 prompt -->
  <text x="18" y="62" font-family="monospace" font-size="12.5" fill="#a6e3a1" class="l1">❯</text>
  <text x="34" y="62" font-family="monospace" font-size="12.5" fill="#cdd6f4" class="l1">unzip Letter-1776082552563.zip</text>

  <!-- Output lines -->
  <text x="18" y="79"  font-family="monospace" font-size="11" fill="#585b70" class="l2">  Archive:  Letter-1776082552563.zip</text>
  <text x="18" y="94"  font-family="monospace" font-size="11" fill="#585b70" class="l3">  inflating: Notes.txt</text>
  <text x="18" y="109" font-family="monospace" font-size="11" fill="#585b70" class="l4">  inflating: letter.png</text>
  <text x="18" y="124" font-family="monospace" font-size="11" fill="#585b70" class="l5">  inflating: Newspaper-Clipping.png</text>

  <!-- Command 2 prompt -->
  <text x="18" y="148" font-family="monospace" font-size="12.5" fill="#a6e3a1" class="l6">❯</text>
  <text x="34" y="148" font-family="monospace" font-size="12.5" fill="#cdd6f4" class="l6">cat Notes.txt</text>

  <!-- Output line 2 -->
  <text x="18" y="166" font-family="monospace" font-size="11" fill="#585b70" class="l7">  Mon cher Édouard,  [...]</text>

  <!-- Next prompt + blinking cursor -->
  <text x="18" y="190" font-family="monospace" font-size="12.5" fill="#a6e3a1" class="l8">❯</text>
  <rect x="34" y="176" width="9" height="16" rx="1" fill="#cdd6f4" class="cursor"/>
</svg>
